local_costmap:
  # Keep the local costmap in odom so the rolling window stays stable as the
  # robot moves, even when AMCL updates the map->odom transform.
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 20.0
  publish_frequency: 10.0
  width: 12.0
  height: 12.0
  resolution: 0.05
  static_map: false
  rolling_window: true

  plugins:
    - {name: obstacles_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflater_layer,  type: "costmap_2d::InflationLayer"}

  obstacles_layer:
    enabled: true
    observation_sources: laser_scan
    laser_scan:
      sensor_frame: tim551
      data_type: LaserScan
      topic: /front/scan
      marking: true
      clearing: true
      min_obstacle_height: -2.0
      max_obstacle_height: 2.0
      obstacle_range: 6.0
      raytrace_range: 6.5
      inf_is_valid: true

  inflater_layer:
    enabled: true
    inflation_radius: 0.45
    cost_scaling_factor: 2.0
