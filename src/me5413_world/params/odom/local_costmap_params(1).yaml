local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 20.0
  publish_frequency: 5.0
  width: 10.0
  height: 10.0
  resolution: 0.05
  static_map: false
  rolling_window: true

  plugins:
    - {name: obstacles_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflater_layer,  type: "costmap_2d::InflationLayer"}

  obstacles_layer:
    enabled: true
    observation_sources: scan
    scan: {sensor_frame: tim551, data_type: LaserScan, topic: /front/scan, marking: true, clearing: true, min_obstacle_height: -2.0, max_obstacle_height: 2.0, obstacle_range: 3.5, raytrace_range: 4.0}

  inflater_layer:
    enabled: true
    inflation_radius: 0.50
    cost_scaling_factor: 5.0
